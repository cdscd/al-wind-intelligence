<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📱 نظام الرصد الملاحي العالمي المتكامل</title>
<link rel="stylesheet" href="https://cloudflare.com" />
<style>
body,html{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#05070a;font-family:system-ui,sans-serif;}
#map{width:100vw;height:100vh;position:absolute;top:0;left:0;z-index:1;}
.control-panel{position:absolute;top:20px;right:20px;color:#fff;z-index:1000;background:rgba(15,23,42,0.95);padding:22px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.7);width:320px;box-sizing:border-box;border:1px solid #1e293b;backdrop-filter:blur(8px);}
.control-panel h2{margin:0 0 5px 0;font-size:16px;color:#38bdf8;text-align:center;}
.control-panel p{margin:0 0 15px 0;font-size:11px;color:#94a3b8;text-align:center;}
.section-title{font-size:12px;color:#38bdf8;font-weight:bold;margin:12px 0 8px 0;}
.layer-item{display:flex;align-items:center;margin-bottom:12px;cursor:pointer;user-select:none;padding:4px;border-radius:6px;transition:background 0.2s;}
.layer-item:hover{background:rgba(255,255,255,0.05);}
.layer-item input{margin-left:12px;transform:scale(1.3);cursor:pointer;}
.layer-name{font-size:14px;font-weight:500;}
</style>
</head>
<body>

    <div id="map"></div>

    <div class="control-panel">
        <h2>📊 لوحة التحكم بالمؤشرات حية</h2>
        <p>"حولنا البكاء إلى ذكاء"</p>
        <hr style="border-color:#334155;">
        
        <div class="section-title">🌬️ متحكمات الرياح والهواء (الرئيسية):</div>
        <label class="layer-item">
            <input type="checkbox" checked id="wind-chk">
            <span class="layer-name">🌬️ حركة الرياح والدوامات (شفافية 100%)</span>
        </label>
        
        <hr style="border-color:#334155;">

        <div class="section-title">🌊 متحكمات البحر والمحيطات (التابعة):</div>
        <label class="layer-item">
            <input type="checkbox" checked id="currents-chk">
            <span class="layer-name">🚢 تيارات المحيط الدائرية (شفافية 90%)</span>
        </label>
        <label class="layer-item">
            <input type="checkbox" checked id="waves-chk">
            <span class="layer-name">🏄‍♂️ حركة الأمواج المتلاطمة (شفافية 80%)</span>
        </label>
    </div>

<script src="https://cloudflare.com"></script>
<script>
window.onload=function(){
    var map = L.map('map', { zoomControl: true, attributionControl: false }).setView([24.0, 45.0], 4);
    L.tileLayer('https://{s}://{z}/{x}/{y}{r}.png', { maxZoom: 10, minZoom: 2 }).addTo(map);
    
    var canvasOverlay = document.createElement("canvas");
    canvasOverlay.style.position = "absolute"; canvasOverlay.style.top = "0"; canvasOverlay.style.left = "0";
    canvasOverlay.style.pointerEvents = "none"; canvasOverlay.style.zIndex = "400"; 
    map.getPanes().overlayPane.appendChild(canvasOverlay);
    var ctx = canvasOverlay.getContext("2d");
    
    var pWind=[], pCurrents=[], pWaves=[], count=220;
    
    var vortices=[
        {lat:25.0,lng:60.0,force:2.0,type:'cyclone'},
        {lat:18.0,lng:40.0,force:1.5,type:'anti-cyclone'},
        {lat:35.0,lng:15.0,force:2.5,type:'cyclone'},
        {lat:5.0,lng:80.0,force:2.2,type:'cyclone'}
    ];

    function generateParticles() {
        pWind=[]; pCurrents=[]; pWaves=[]; var size = map.getSize();
        for(var i=0;i<count;i++){
            pWind.push({x:Math.random()*size.x,y:Math.random()*size.y,history:[],s:1.2+Math.random()*1.5});
            pCurrents.push({x:Math.random()*size.x,y:Math.random()*size.y,history:[],s:0.8+Math.random()*1.2});
            pWaves.push({x:Math.random()*size.x,y:Math.random()*size.y,history:[],s:1.0+Math.random()*1.4});
        }
    }

    function updateCanvasSize() {
        var size = map.getSize(); canvasOverlay.width = size.x; canvasOverlay.height = size.y;
        var topLeft = map.containerPointToLayerPoint(); L.DomUtil.setPosition(canvasOverlay, topLeft);
        generateParticles();
    }
    map.on('moveend resize', updateCanvasSize); updateCanvasSize();

    function getVectorForce(x,y){
        var dx=1.2,dy=0.2;
        vortices.forEach(function(v){
            var vPoint = map.latLngToContainerPoint([v.lat, v.lng]); var diffX=vPoint.x-x,diffY=vPoint.y-y; var dist=Math.sqrt(diffX*diffX+diffY*diffY);
            if(dist<450){
                var str=(1-(dist/450))*v.force;
                if(v.type==='cyclone'){
                    dx+=(-diffY/dist)*str*2.8+(diffX/dist)*str*0.4;
                    dy+=(diffX/dist)*str*2.8+(diffY/dist)*str*0.4;
                }
                else{dx+=(diffY/dist)*str*2.2;dy+=(-diffX/dist)*str*2.2;}
            }
        });
        return{x:dx,y:dy};
    }

    function drawFlowLine(p, color, maxLen) {
        if (p.history.length < 2) return;
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.6;
        ctx.moveTo(p.history[0].x, p.history[0].y);
        for (var i = 1; i < p.history.length; i++) {
            ctx.lineTo(p.history[i].x, p.history[i].y);
        }
        ctx.stroke();
    }

    function renderEngine(){
        ctx.fillStyle="rgba(5,7,10,0.14)"; ctx.fillRect(0,0,canvasOverlay.width,canvasOverlay.height);
        var w=canvasOverlay.width,h=canvasOverlay.height;
        
        // 1. حركة الرياح الطويلة (شفافية 100% -> Alpha: 1.0)
        if(document.getElementById("wind-chk").checked){
            pWind.forEach(function(p){
                p.history.push({x:p.x,y:p.y}); if(p.history.length>14) p.history.shift();
                drawFlowLine(p, "rgba(255, 255, 255, 1.0)");
                var f=getVectorForce(p.x,p.y); p.x+=f.x*p.s; p.y+=f.y*p.s;
                if(p.x>w||p.x<0||p.y>h||p.y<0||p.history.length>80){p.x=Math.random()*w;p.y=Math.random()*h;p.history=[];}
            });
        }
        
        // 2. حركة تيارات المحيط الدائرية (شفافية 90% -> Alpha: 0.9)
        if(document.getElementById("currents-chk").checked){
            pCurrents.forEach(function(p){
                p.history.push({x:p.x,y:p.y}); if(p.history.length>18) p.history.shift();
                drawFlowLine(p, "rgba(0, 191, 255, 0.90)");
                var f=getVectorForce(p.x,p.y); p.x+=f.x*p.s*0.7; p.y+=f.y*p.s*0.7;
                if(p.x>w||p.x<0||p.y>h||p.y<0){p.x=Math.random()*w;p.y=Math.random()*h;p.history=[];}
            });
        }
        
        // 3. حركة الأمواج المتلاطمة (شفافية 80% -> Alpha: 0.8)
        if(document.getElementById("waves-chk").checked){
            pWaves.forEach(function(p){
                p.history.push({x:p.x,y:p.y}); if(p.history.length>12) p.history.shift();
                drawFlowLine(p, "rgba(217, 70, 239, 0.80)");
                var f=getVectorForce(p.x,p.y); p.x+=(f.x+0.5)*p.s*0.9; p.y+=(f.y+0.5)*p.s*0.9;
                if(p.x>w||p.x<0||p.y>h||p.y<0){p.x=Math.random()*w;p.y=Math.random()*h;p.history=[];}
            });
        }
        requestAnimationFrame(renderEngine);
    }
    
    map.on('move', function() { ctx.clearRect(0, 0, canvasOverlay.width, canvasOverlay.height); var topLeft = map.containerPointToLayerPoint(); L.DomUtil.setPosition(canvasOverlay, topLeft); });
    renderEngine();
};
</script>
</body>
</html>
